kind = "web"
previewPath = "/"
title = "Visiting Card Extractor"
version = "1.0.0"
id = "artifacts/card-extractor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20971

[services.development]
run = "pnpm --filter @workspace/card-extractor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/card-extractor", "run", "build" ]
publicDir = "artifacts/card-extractor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20971"
BASE_PATH = "/"
